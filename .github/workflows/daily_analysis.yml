name: Stock Analysis Daily

on:
  # 每天定时运行
  schedule:
    # 北京时间 10:50 (UTC 02:50)
    - cron: '50 2 * * 1-5'
    # 北京时间 15:30 (UTC 07:30)
    - cron: '30 7 * * 1-5'
    # 北京时间 16:00 (UTC 08:00) - 策略更新
    - cron: '0 8 * * 1-5'
    # 每周日北京时间 20:00 (UTC 12:00) - GitHub策略搜索
    - cron: '0 12 * * 0'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      command:
        description: '执行命令'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - review
          - refresh
          - test

jobs:
  stock-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run analysis
        env:
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          python cli.py ${{ github.event.inputs.command || 'scan' }} --top 20
