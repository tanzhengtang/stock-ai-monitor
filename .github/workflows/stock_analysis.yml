name: Stock Analysis System

on:
  schedule:
    - cron: '50 2 * * 1-5'
    - cron: '30 7 * * 1-5'
    - cron: '0 8 * * 1-5'
    - cron: '0 12 * * 0'
    - cron: '0 18 * * *'
  
  workflow_dispatch:
    inputs:
      task:
        description: '执行任务'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - refresh
          - test

env:
  PYTHON_VERSION: '3.11'

jobs:
  scan-stocks:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 7 * * 1-5' || github.event.inputs.task == 'scan'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests pandas numpy schedule
      
      - name: Create config
        run: |
          python -c "
          import yaml
          config = {
              'push_type': 'email',
              'email': {
                  'smtp_server': '${{ secrets.EMAIL_SMTP_SERVER }}',
                  'smtp_port': int('${{ secrets.EMAIL_SMTP_PORT }}'),
                  'sender_email': '${{ secrets.EMAIL_SENDER }}',
                  'sender_password': '${{ secrets.EMAIL_PASSWORD }}',
                  'receiver_emails': ['${{ secrets.EMAIL_RECEIVERS }}']
              }
          }
          with open('config/settings.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          "
      
      - name: Run scan
        run: python github_actions_runner.py scan

  refresh-pool:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 18 * * *' || github.event.inputs.task == 'refresh'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests pandas numpy schedule
      
      - name: Refresh stock pool
        run: python github_actions_runner.py refresh
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/all_stocks.json
          git diff --staged --quiet || git commit -m "Update stock pool [skip ci]"
          git push

  test-email:
    runs-on: ubuntu-latest
    if: github.event.inputs.task == 'test'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests pandas numpy schedule
      
      - name: Create config
        run: |
          python -c "
          import yaml
          config = {
              'push_type': 'email',
              'email': {
                  'smtp_server': '${{ secrets.EMAIL_SMTP_SERVER }}',
                  'smtp_port': int('${{ secrets.EMAIL_SMTP_PORT }}'),
                  'sender_email': '${{ secrets.EMAIL_SENDER }}',
                  'sender_password': '${{ secrets.EMAIL_PASSWORD }}',
                  'receiver_emails': ['${{ secrets.EMAIL_RECEIVERS }}']
              }
          }
          with open('config/settings.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          "
      
      - name: Test email
        run: python cli.py test
