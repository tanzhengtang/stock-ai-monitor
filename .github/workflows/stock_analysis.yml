name: Stock Analysis System

on:
  workflow_dispatch:
    inputs:
      task:
        description: '选择任务'
        required: true
        default: 'test'
        type: choice
        options:
          - test        # 测试邮件
          - scan        # 全A股扫描
          - refresh     # 刷新股票池

jobs:
  run-task:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests pandas numpy schedule
      
      - name: Debug - Check secrets
        run: |
          echo "EMAIL_SMTP_SERVER=${{ secrets.EMAIL_SMTP_SERVER }}"
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}"
          echo "EMAIL_RECEIVERS=${{ secrets.EMAIL_RECEIVERS }}"
          # 不打印密码
      
      - name: Create config
        env:
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: python github_actions_config.py
      
      - name: Run task
        env:
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          TASK="${{ github.event.inputs.task }}"
          echo "Running task: $TASK"
          
          if [ "$TASK" = "test" ]; then
            python cli.py test
          elif [ "$TASK" = "scan" ]; then
            python github_actions_runner.py scan
          elif [ "$TASK" = "refresh" ]; then
            python github_actions_runner.py refresh
          else
            echo "Unknown task: $TASK"
            exit 1
          fi
