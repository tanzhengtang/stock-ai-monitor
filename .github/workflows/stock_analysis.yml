name: Stock Analysis System

on:
  # 定时任务（UTC时间）
  schedule:
    # 北京时间 10:50 (UTC 02:50) - 早盘复盘
    - cron: '50 2 * * 1-5'
    # 北京时间 15:30 (UTC 07:30) - 尾盘预测
    - cron: '30 7 * * 1-5'
    # 北京时间 16:00 (UTC 08:00) - 策略更新
    - cron: '0 8 * * 1-5'
    # 每周日北京时间 20:00 (UTC 12:00) - GitHub策略搜索
    - cron: '0 12 * * 0'
    # 每日凌晨 2:00 (UTC 18:00) - 刷新股票池
    - cron: '0 18 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      task:
        description: '执行任务'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan        # 全A股扫描
          - refresh     # 刷新股票池
          - test        # 测试邮件

env:
  PYTHON_VERSION: '3.11'

jobs:
  # 任务1: 全A股扫描
  scan-stocks:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 7 * * 1-5' || github.event.inputs.task == 'scan'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run full scan
        env:
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          python github_actions_runner.py scan
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stock-report-${{ github.run_number }}
          path: |
            data/*.json
          retention-days: 30

  # 任务2: 刷新股票池
  refresh-pool:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 18 * * *' || github.event.inputs.task == 'refresh'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Refresh stock pool
        run: |
          python github_actions_runner.py refresh
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/all_stocks.json
          git diff --staged --quiet || git commit -m "Update stock pool [skip ci]"
          git push

  # 任务3: 测试邮件
  test-email:
    runs-on: ubuntu-latest
    if: github.event.inputs.task == 'test'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Test email
        env:
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          python cli.py test
